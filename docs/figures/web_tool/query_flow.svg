  <text class="st7" transform="translate(326.2 22.58)"><tspan x="0" y="0">Multi-DWPC web tool: query flow</tspan></text>
  <text class="st7" transform="translate(316.5 70.72)"><tspan x="0" y="0">User submits: gene list (symbols/Entrez) + target node</tspan></text>
  <text class="st5" transform="translate(308.42 132.51)"><tspan x="0" y="0">Validate genes against Node table; resolve target via /v1/nodes</tspan></text>
  <text class="st5" transform="translate(362.72 190.02)"><tspan x="0" y="0">Enumerate G-&gt;target metapaths</tspan></text>
  <text class="st5" transform="translate(355.05 198.79)"><tspan x="0" y="0">(discover_source_target_metapaths)</tspan></text>
  <text class="st5" transform="translate(202.53 268.09)"><tspan x="0" y="0">Real DWPC</tspan></text>
  <text class="st5" transform="translate(175.18 276.75)"><tspan x="0" y="0">HetMat.get_dwpc_for_pairs</tspan></text>
  <text class="st5" transform="translate(181.29 285.52)"><tspan x="0" y="0">(vectorized lookup, b=1)</tspan></text>
  <text class="st5" transform="translate(596.07 268.14)"><tspan x="0" y="0">Null DWPC</tspan></text>
  <text class="st5" transform="translate(567.71 276.71)"><tspan x="0" y="0">b=20 random gene subsets</tspan></text>
  <text class="st5" transform="translate(595.18 285.37)"><tspan x="0" y="0">same target</tspan></text>
  <text class="st5" transform="translate(340.49 359.28)"><tspan x="0" y="0">z = (real - null_mean) / null_std per metapath</tspan></text>
  <text class="st5" transform="translate(332.25 421.07)"><tspan x="0" y="0">Return ranked metapath table -&gt; user selects one</tspan></text>
  <text class="st5" transform="translate(187.63 494.72)"><tspan x="0" y="0">Intermediate sharing</tspan></text>
  <text class="st5" transform="translate(167.61 503.4)"><tspan x="0" y="0">enumerate_gene_intermediates</tspan></text>
  <text class="st5" transform="translate(165.84 512.17)"><tspan x="0" y="0">(per-gene top-K, path_z &gt;= 1.65)</tspan></text>
  <text class="st5" transform="translate(582.5 494.82)"><tspan x="0" y="0">Surviving subpaths</tspan></text>
  <text class="st5" transform="translate(566.5 503.55)"><tspan x="0" y="0">(same call as intermediates,</tspan></text>
  <text class="st5" transform="translate(584.06 512.21)"><tspan x="0" y="0">record_paths flag)</tspan></text>
  <text class="st5" transform="translate(312.79 568.71)"><tspan x="0" y="0">Frontend: ranking table, sharing heatmap, subpath subgraph</tspan></text>
